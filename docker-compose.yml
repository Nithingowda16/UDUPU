version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: ../docker/backend.Dockerfile
    volumes:
      - uploads_volume:/app/uploads
      - generated_volume:/app/generated
      - db_volume:/app/database
    environment:
      - SECRET_KEY=prod-secret-9182391823
      - JWT_SECRET_KEY=jwt-prod-secret-291847129
      - DATABASE_URL=sqlite:////app/database/tryon.db
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/frontend.Dockerfile
    restart: always

  nginx:
    image: nginx:stable-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - uploads_volume:/usr/share/nginx/html/uploads:ro
      - generated_volume:/usr/share/nginx/html/generated:ro
    depends_on:
      - backend
      - frontend
    restart: always

volumes:
  uploads_volume:
  generated_volume:
  db_volume:
